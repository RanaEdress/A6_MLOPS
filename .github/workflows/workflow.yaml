name: Gatekeeper Pipeline

on:
  push:
    branches:
      - main

jobs:
  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run linter
        run: |
          echo "Running linter"
          echo "Lint passed"

  train:
    runs-on: ubuntu-latest
    needs: linter

    if: >
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run training
        run: |
          echo "Starting expensive training job"
          python train.py

      - name: Save error logs
        if: failure()
        run: |
          echo "Training failed!" > error_logs.txt

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes"
